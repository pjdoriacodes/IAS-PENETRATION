<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// SAVE CART TO LOCAL STORAGE
function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

// LOAD CART ON PAGE LOAD
window.onload = function(){
    updateCartUI();
};

// TOGGLE CART
function toggleCart(){
    document.getElementById("cartPanel").classList.toggle("active");
}

// ADD TO CART
function addToCart(button){
    let card = button.closest(".card");
    let name = card.querySelector("h3").textContent;
    let price = parseInt(card.getAttribute("data-price"));
    let image = card.querySelector("img").src;

    let existing = cart.find(item => item.name === name);

    if(existing){
        existing.quantity++;
    }else{
        cart.push({name, price, image, quantity:1});
    }

    saveCart();
    updateCartUI();
}

// UPDATE UI
function updateCartUI(){
    let cartItems = document.getElementById("cartItems");
    let totalEl = document.getElementById("cartTotal");
    let countEl = document.getElementById("cartCount");

    if(!cartItems) return;

    cartItems.innerHTML="";
    let total=0;
    let count=0;

    cart.forEach((item,index)=>{
        total+=item.price*item.quantity;
        count+=item.quantity;

        cartItems.innerHTML+=`
        <div class="cart-item">
            <img src="${item.image}">
            <div>
                <strong>${item.name}</strong><br>
                ₱${item.price}<br>
                <button onclick="changeQty(${index},-1)">−</button>
                ${item.quantity}
                <button onclick="changeQty(${index},1)">+</button>
                <button onclick="removeItem(${index})">🗑</button>
            </div>
        </div>`;
    });

    totalEl.textContent="₱"+total;
    countEl.textContent=count;
}

// CHANGE QTY
function changeQty(index,change){
    cart[index].quantity+=change;

    if(cart[index].quantity<=0){
        cart.splice(index,1);
    }

    saveCart();
    updateCartUI();
}

// REMOVE
function removeItem(index){
    cart.splice(index,1);
    saveCart();
    updateCartUI();
}

// CHECKOUT
function checkout(){
    let total = cart.reduce((sum,item)=>sum+item.price*item.quantity,0);

    if(total === 0){
        alert("Your cart is empty!");
        return;
    }

    let orderSummary = "🛍️ Your Order:\n\n";

    cart.forEach(item => {
        orderSummary += 
            item.name + 
            " (x" + item.quantity + ") - ₱" + (item.price * item.quantity) + "\n";
    });

    orderSummary += "\nTotal: ₱" + total;
    orderSummary += "\n\n🎉 Salamat! Your order has been placed!";
    orderSummary += "\nDaghang salamat sa pagpalit sa PinoyMart!";

    alert(orderSummary);

    cart = [];
    saveCart();
    updateCartUI();
    toggleCart();
}

// Show logout only if logged in
window.addEventListener("DOMContentLoaded", function(){
    const logoutIcon = document.querySelector(".logout-icon");

    if(localStorage.getItem("loggedIn") !== "true"){
        logoutIcon.style.display = "none";
    }
});

function logout(){
    localStorage.removeItem("loggedIn");
    alert("Logged out successfully!");
    window.location.href = "login.html";
}
</script>
